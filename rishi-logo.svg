<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8732D;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#F5A571;stop-opacity:0.1"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8732D"/>
      <stop offset="100%" style="stop-color:#F5A571"/>
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="60" cy="60" r="58" fill="#1B2348"/>
  
  <!-- Subtle glow -->
  <circle cx="45" cy="45" r="40" fill="url(#glowGrad)"/>
  
  <!-- Outer ring -->
  <circle cx="60" cy="60" r="54" fill="none" stroke="#E8732D" stroke-width="1.5" opacity="0.4"/>
  
  <!-- Stylized ऋ (Rishi) symbol - simplified geometric interpretation -->
  <g transform="translate(60, 60)">
    <!-- Central flame/wisdom shape -->
    <path d="M0,-28 C12,-20 15,-8 12,0 C10,6 6,12 0,18 C-6,12 -10,6 -12,0 C-15,-8 -12,-20 0,-28Z" 
          fill="url(#orangeGrad)"/>
    
    <!-- Inner flame detail -->
    <path d="M0,-18 C6,-12 8,-4 6,2 C5,5 3,8 0,12 C-3,8 -5,5 -6,2 C-8,-4 -6,-12 0,-18Z" 
          fill="#1B2348"/>
    
    <!-- Bottom curve - representing knowledge/foundation -->
    <path d="M-20,22 Q-10,30 0,28 Q10,30 20,22" 
          fill="none" stroke="url(#orangeGrad)" stroke-width="3" stroke-linecap="round"/>
    
    <!-- Side elements - representing wisdom rays -->
    <line x1="-24" y1="-5" x2="-32" y2="-12" stroke="#E8732D" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
    <line x1="24" y1="-5" x2="32" y2="-12" stroke="#E8732D" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
    <line x1="-22" y1="8" x2="-30" y2="10" stroke="#F5A571" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
    <line x1="22" y1="8" x2="30" y2="10" stroke="#F5A571" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  </g>
  
  <!-- Decorative dots -->
  <circle cx="60" cy="12" r="2" fill="#E8732D" opacity="0.6"/>
  <circle cx="60" cy="108" r="2" fill="#E8732D" opacity="0.6"/>
</svg>